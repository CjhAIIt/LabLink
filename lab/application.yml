server:
  port: ${SERVER_PORT:8081}

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/lab_recruitment?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:cjh041217}
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:2371796741@qq.com}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/*.xml

jwt:
  secret: ${JWT_SECRET:labRecruitmentSecretKey2023ForJWTTokenGenerationAndValidationThisIsASecureKey}
  expiration: 86400000

file:
  upload-path: ${FILE_UPLOAD_PATH:./uploads/}

judge:
  python-command: ${JUDGE_PYTHON_COMMAND:C:/Program Files/MySQL/MySQL Workbench 8.0/python.exe}
  c-compiler-command: ${JUDGE_C_COMPILER_COMMAND:gcc}
  cpp-compiler-command: ${JUDGE_CPP_COMPILER_COMMAND:g++}
  java-compiler-command: ${JUDGE_JAVA_COMPILER_COMMAND:javac}
  java-command: ${JUDGE_JAVA_COMMAND:java}

logging:
  level:
    org.springframework.security: DEBUG
    com.lab.recruitment: DEBUG
    org.springframework.web: DEBUG
  file:
    name: logs/application.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

app:
  email-auth:
    from-name: 安徽信息工程学院实验室管理平台
    code-expire-minutes: 10
    resend-interval-seconds: 60
  seed:
    normalize-demo-data: true
