services:
  mysql:
    image: mysql:8.0
    container_name: lab-mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-lab_recruitment}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/main/resources/init.sql:/docker-entrypoint-initdb.d/01-lab-init.sql:ro

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: lab-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:mysql://mysql:3306/lab_recruitment?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      FILE_UPLOAD_PATH: /app/uploads/
      FILE_PROTECTED_UPLOAD_PATH: /app/uploads_protected/
      JUDGE_PYTHON_COMMAND: python3
      JUDGE_C_COMPILER_COMMAND: gcc
      JUDGE_CPP_COMPILER_COMMAND: g++
      JUDGE_JAVA_COMPILER_COMMAND: javac
      JUDGE_JAVA_COMMAND: java
      JUDGE_WORK_DIR: /app/judge-work
      APP_SECURITY_ALLOWED_ORIGINS_CSV: ${APP_SECURITY_ALLOWED_ORIGINS_CSV:-https://your-domain.example.com}
    ports:
      - "8081:8081"
    volumes:
      - app-uploads:/app/uploads
      - app-uploads-protected:/app/uploads_protected
      - app-judge-work:/app/judge-work
      - app-logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS 'http://127.0.0.1:8081/labs/list?pageNum=1&pageSize=1' >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lab-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  mysql-data:
  app-uploads:
  app-uploads-protected:
  app-judge-work:
  app-logs:
